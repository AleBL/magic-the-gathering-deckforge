name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Type-check, lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve Yarn cache folder
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache Yarn packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type-check
        run: yarn type-check

      - name: Lint
        run: yarn lint:check

      - name: Test with coverage
        run: yarn test:coverage

  build:
    name: Build (${{ matrix.platform }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            build-script: build:win
          - platform: mac
            os: macos-latest
            build-script: build:mac
          - platform: linux
            os: ubuntu-latest
            build-script: build:linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve Yarn cache folder
        id: yarn-cache
        shell: bash
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache Yarn packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      # electron-builder names artifacts (and the app reads its displayed version)
      # from package.json's version field, not from the git tag. Stamp the tag's
      # version into package.json before building so both match the release.
      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # No code-signing certificates are configured, so unsigned builds are expected
      # on Windows and Mac. Disabling auto-discovery avoids electron-builder failing
      # while looking for a signing identity that doesn't exist in this environment.
      - name: Build installers and portable archive
        run: yarn ${{ matrix.build-script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      # Makes re-running this job for the same tag (e.g. after re-tagging to pick up
      # a fix) idempotent. Without this, generate_release_notes can concatenate fresh
      # notes onto an existing release's body instead of replacing it, producing
      # duplicate "What's Changed" sections.
      - name: Delete existing release for this tag, if any
        continue-on-error: true
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*

      - name: Create release with all platform artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
